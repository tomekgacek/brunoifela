<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bruno i Fela | Listen</title>
    <meta name="description" content="Posłuchaj 90 sekund ze świata Bruno i Fela, a następnie pełnego pierwszego odcinka.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #f9f2dd;
            --ink: #1f2a2a;
            --muted: #4c5a5b;
            --leaf: #2f8f5b;
            --sky: #7cc7c2;
            --berry: #d8584a;
            --line: rgba(31, 42, 42, 0.1);
            --card: rgba(255, 255, 255, 0.88);
            --shadow: 0 20px 50px rgba(30, 51, 39, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 12%, rgba(124, 199, 194, 0.4), transparent 32%),
                radial-gradient(circle at 92% 8%, rgba(244, 183, 64, 0.35), transparent 28%),
                linear-gradient(180deg, var(--bg-cream) 0%, #f7eac8 45%, #f2e2bc 100%);
            display: grid;
            place-items: center;
            padding: 26px 16px 40px;
        }

        .backdrop-shape {
            position: fixed;
            z-index: -1;
            border-radius: 999px;
            filter: blur(1px);
            opacity: 0.45;
        }

        .backdrop-shape.one {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, #74bd7f, #d8f0a8);
            left: -110px;
            top: 180px;
        }

        .backdrop-shape.two {
            width: 240px;
            height: 240px;
            background: linear-gradient(160deg, #f3b34c, #f8dd88);
            right: -70px;
            top: 380px;
        }

        .panel {
            width: min(880px, 100%);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 26px;
        }

        .cover {
            width: min(520px, 100%);
            margin: 0 auto;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .cover img {
            width: 100%;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .tagline {
            margin: 18px auto 0;
            max-width: 46ch;
            text-align: center;
            color: var(--ink);
            font-weight: 700;
            line-height: 1.5;
            font-size: clamp(1rem, 2.1vw, 1.16rem);
        }

        .play-btn {
            margin: 20px auto 0;
            width: min(360px, 100%);
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--berry), #f2826c);
            color: #fff;
            font-family: "Baloo 2", cursive;
            font-size: 1.35rem;
            font-weight: 800;
            padding: 13px 18px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .audio {
            display: none;
        }

        .next-step {
            margin: 16px auto 0;
            width: min(520px, 100%);
            border: 1px solid rgba(47, 143, 91, 0.35);
            border-radius: 14px;
            background: rgba(124, 199, 194, 0.2);
            padding: 14px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transform: translateY(6px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .next-step.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .next-step p {
            margin: 0;
            color: var(--ink);
            font-weight: 700;
        }

        .next-step button {
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--leaf), var(--sky));
            color: #fff;
            font-family: "Baloo 2", cursive;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 10px 14px;
            cursor: pointer;
        }

        .full-episode {
            scroll-margin-top: 18px;
        }

        .section-break {
            margin: 34px 0 26px;
            border: 0;
            border-top: 1px solid var(--line);
        }

        .full-title {
            margin: 0;
            text-align: center;
            font-family: "Baloo 2", cursive;
            font-size: clamp(1.45rem, 2.8vw, 2rem);
            line-height: 1.2;
        }

        .full-btn {
            margin-top: 16px;
            width: min(420px, 100%);
            font-size: 1.2rem;
        }

        .season {
            margin-top: 30px;
            text-align: center;
        }

        .season a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.72);
        }

        .season a:hover {
            background: rgba(124, 199, 194, 0.23);
        }
    </style>
</head>
<body>
    <div class="backdrop-shape one" aria-hidden="true"></div>
    <div class="backdrop-shape two" aria-hidden="true"></div>
    <main class="panel" aria-label="Strefa odsłuchu Bruno i Fela">
        <div class="cover">
            <img src="../assets/pics/Bruno_i_Fela.JPEG" alt="Okładka Bruno i Fela">
        </div>

        <p class="tagline"><strong>Posłuchaj 90 sekund, które przeniosą Cię do świata Bruna i Feli.</strong></p>

        <button id="playTrailer" class="play-btn" type="button">▶ Odtwórz</button>
        <audio id="trailerAudio" class="audio" preload="none" src="../assets/wydawcy/Bruno_i_Fela_sample.mp3"></audio>
        <section id="nextStep" class="next-step" aria-live="polite" aria-hidden="true">
            <p>Gotowe. Czas na pełną historię.</p>
            <button id="goEpisode" type="button">▶ Przejdź do pełnego odcinka</button>
        </section>

        <hr class="section-break">

        <section id="fullEpisode" class="full-episode">
            <h2 class="full-title">Posłuchaj całego odcinka</h2>
            <button id="playEpisode" class="play-btn full-btn" type="button">▶ Posłuchaj całego odcinka</button>
            <audio id="episodeAudio" class="audio" preload="none" src="../assets/wydawcy/Bruno_i_Fela_s01E01.mp3"></audio>
        </section>

        <div class="season">
            <a href="https://www.youtube.com/@BrunoiFela/playlists" target="_blank" rel="noopener noreferrer">Cały sezon na YouTube</a>
        </div>
    </main>

    <script>
        const trailerBtn = document.getElementById("playTrailer");
        const trailerAudio = document.getElementById("trailerAudio");
        const episodeBtn = document.getElementById("playEpisode");
        const episodeAudio = document.getElementById("episodeAudio");
        const nextStep = document.getElementById("nextStep");
        const goEpisode = document.getElementById("goEpisode");
        const fullEpisode = document.getElementById("fullEpisode");

        function revealNextStep() {
            nextStep.classList.add("visible");
            nextStep.setAttribute("aria-hidden", "false");
        }

        function wireButton(button, audio, label) {
            button.addEventListener("click", () => {
                if (audio.paused) {
                    episodeAudio.pause();
                    trailerAudio.pause();
                    audio.play();
                    button.textContent = "⏸ Wstrzymaj";
                } else {
                    audio.pause();
                    button.textContent = label;
                }
            });

            audio.addEventListener("ended", () => {
                button.textContent = label;
            });

            audio.addEventListener("pause", () => {
                if (audio.currentTime > 0 && !audio.ended) {
                    button.textContent = label;
                }
            });
        }

        wireButton(trailerBtn, trailerAudio, "▶ Odtwórz");
        wireButton(episodeBtn, episodeAudio, "▶ Posłuchaj całego odcinka");

        trailerAudio.addEventListener("ended", revealNextStep);

        goEpisode.addEventListener("click", () => {
            fullEpisode.scrollIntoView({ behavior: "smooth", block: "start" });
            episodeBtn.focus({ preventScroll: true });
        });
    </script>
</body>
</html>
