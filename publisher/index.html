<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bruno i Fela | Publisher Preview</title>
    <meta name="description" content="Publisher Preview projektu Bruno i Fela.">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #f9f2dd;
            --ink: #1f2a2a;
            --muted: #4c5a5b;
            --leaf: #2f8f5b;
            --sky: #7cc7c2;
            --berry: #d8584a;
            --line: rgba(31, 42, 42, 0.1);
            --card: rgba(255, 255, 255, 0.88);
            --shadow: 0 20px 50px rgba(30, 51, 39, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 12%, rgba(124, 199, 194, 0.4), transparent 32%),
                radial-gradient(circle at 92% 8%, rgba(244, 183, 64, 0.35), transparent 28%),
                linear-gradient(180deg, var(--bg-cream) 0%, #f7eac8 45%, #f2e2bc 100%);
            padding: 28px 14px;
        }

        .backdrop-shape {
            position: fixed;
            z-index: -1;
            border-radius: 999px;
            filter: blur(1px);
            opacity: 0.45;
        }

        .backdrop-shape.one {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, #74bd7f, #d8f0a8);
            left: -110px;
            top: 180px;
        }

        .backdrop-shape.two {
            width: 240px;
            height: 240px;
            background: linear-gradient(160deg, #f3b34c, #f8dd88);
            right: -70px;
            top: 380px;
        }

        .room {
            width: min(760px, 100%);
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--leaf), var(--sky));
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            box-shadow: 0 8px 18px rgba(47, 143, 91, 0.3);
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-family: "Baloo 2", cursive;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1;
        }

        .sub {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 1.05rem;
            font-weight: 700;
        }

        .stack {
            margin-top: 24px;
            display: grid;
            gap: 14px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--berry), #f2826c);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            padding: 14px 16px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .link {
            display: block;
            text-decoration: none;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 13px 14px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.72);
        }

        .link:hover {
            background: rgba(124, 199, 194, 0.23);
        }

        .contact {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-weight: 700;
        }

        .contact strong {
            color: var(--ink);
            display: block;
            margin-top: 6px;
        }

        .audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="backdrop-shape one" aria-hidden="true"></div>
    <div class="backdrop-shape two" aria-hidden="true"></div>
    <main class="room">
        <div class="brand-row">
            <span class="brand-badge" aria-hidden="true">BF</span>
            <h1>Bruno i Fela</h1>
        </div>
        <p class="sub">Publisher Preview</p>

        <div class="stack">
            <button id="playTrailer" class="btn" type="button">▶ Posłuchaj 90 sekund</button>
            <audio id="trailerAudio" class="audio" preload="none" src="../assets/wydawcy/Bruno_i_Fela_sample.mp3"></audio>

            <button id="playEpisode" class="btn" type="button">▶ Posłuchaj odcinka 1</button>
            <audio id="episodeAudio" class="audio" preload="none" src="../assets/wydawcy/Bruno_i_Fela_s01E01.mp3"></audio>

            <a class="link" href="../assets/wydawcy/Bruno_i_Fela_Publisher_Pitch_Deck.pdf" download>Pobierz Pitch Deck (Bruno_i_Fela_Publisher_Pitch_Deck.pdf)</a>
            <a class="link" href="../assets/wydawcy/Pobierz%20One%20Pager.pdf" download>Pobierz One Pager (Pobierz One Pager.pdf)</a>
        </div>

        <div class="contact">
            Kontakt:
            <strong>Tomasz Gacek</strong>
        </div>
    </main>

    <script>
        const trailerBtn = document.getElementById("playTrailer");
        const trailerAudio = document.getElementById("trailerAudio");
        const episodeBtn = document.getElementById("playEpisode");
        const episodeAudio = document.getElementById("episodeAudio");

        function wireButton(button, audio, label) {
            button.addEventListener("click", () => {
                if (audio.paused) {
                    episodeAudio.pause();
                    trailerAudio.pause();
                    audio.play();
                    button.textContent = "⏸ Wstrzymaj";
                } else {
                    audio.pause();
                    button.textContent = label;
                }
            });

            audio.addEventListener("ended", () => {
                button.textContent = label;
            });

            audio.addEventListener("pause", () => {
                if (audio.currentTime > 0 && !audio.ended) {
                    button.textContent = label;
                }
            });
        }

        wireButton(trailerBtn, trailerAudio, "▶ Posłuchaj 90 sekund");
        wireButton(episodeBtn, episodeAudio, "▶ Posłuchaj odcinka 1");
    </script>
</body>
</html>
